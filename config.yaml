# ──────────────────────────────────────────────────────────────────────────────
# Pipeline Wizard – Configuration
# ──────────────────────────────────────────────────────────────────────────────
# Edit this file to customise guardrails, retry behaviour, and ECS validation
# without touching Python code.  The wizard loads it once at import time via
# config.load_config().

# ── Retry limits ──────────────────────────────────────────────────────────────
max_guardrail_retries: 3
max_simulation_retries: 3

# ── Forbidden processors ─────────────────────────────────────────────────────
# These processor types will be rejected by the guardrails checker.
# Add or remove entries as company policy evolves.
forbidden_processors:
  - script       # security risk in production
  - drop         # data-loss risk – should be explicit in routing
  - pipeline     # nested pipelines are hard to maintain

# ── Processor phase ordering ─────────────────────────────────────────────────
# Processors MUST appear in this phase order: parse → transform → calculate.
# Within each phase the order is free.
processor_phases:
  parse:
    - dissect
    - grok
    - csv
    - json
    - kv
    - uri_parts
    - user_agent
    - gsub  # Allowed in parse phase for pre-cleaning

  transform:
    - rename
    - remove
    - set
    - convert
    # gsub moved to parse
    - lowercase
    - uppercase
    - trim
    - split
    - join
    - sort
    - dot_expander
    - date

  calculate:
    - enrich
    - geo_ip
    - append
    - bytes
    - community_id
    - fingerprint
    - network_direction
    - registered_domain
    - url_decode

# ── ECS namespaces ───────────────────────────────────────────────────────────
# Recognised top-level ECS namespace prefixes.  Fields whose first dotted
# segment is NOT in this list (and is not a well-known bare field like
# "message") will trigger a warning.
ecs_namespaces:
  - agent
  - as
  - client
  - cloud
  - container
  - destination
  - dll
  - dns
  - ecs
  - error
  - event
  - file
  - geo
  - group
  - hash
  - host
  - http
  - labels
  - log
  - network
  - observer
  - organization
  - os
  - package
  - pe
  - process
  - registry
  - related
  - rule
  - server
  - service
  - source
  - threat
  - tls
  - url
  - user
  - user_agent
  - vulnerability

# ── ECS field catalog ────────────────────────────────────────────────────────
# A subset of the Elastic Common Schema used for validation.
# In production you can replace this with the full generated schema from
# https://github.com/elastic/ecs/tree/main/generated/elasticsearch
#
# Format:  field.name: { type: <es_type>, required: true|false }
ecs_field_catalog:
  # Base
  "@timestamp":                  { type: date,    required: true }
  message:                       { type: text,    required: false }
  tags:                          { type: keyword, required: false }
  labels:                        { type: object,  required: false }
  # Agent
  agent.id:                      { type: keyword }
  agent.name:                    { type: keyword }
  agent.type:                    { type: keyword }
  agent.version:                 { type: keyword }
  # Client / Server / Source / Destination
  client.ip:                     { type: ip }
  client.port:                   { type: long }
  client.bytes:                  { type: long }
  server.ip:                     { type: ip }
  server.port:                   { type: long }
  server.bytes:                  { type: long }
  source.ip:                     { type: ip }
  source.port:                   { type: long }
  source.bytes:                  { type: long }
  destination.ip:                { type: ip }
  destination.port:              { type: long }
  destination.bytes:             { type: long }
  # Event
  event.action:                  { type: keyword }
  event.category:                { type: keyword }
  event.created:                 { type: date }
  event.dataset:                 { type: keyword }
  event.duration:                { type: long }
  event.id:                      { type: keyword }
  event.kind:                    { type: keyword }
  event.module:                  { type: keyword }
  event.original:                { type: keyword }
  event.outcome:                 { type: keyword }
  event.severity:                { type: long }
  event.type:                    { type: keyword }
  # Host
  host.hostname:                 { type: keyword }
  host.ip:                       { type: ip }
  host.name:                     { type: keyword }
  host.os.family:                { type: keyword }
  host.os.name:                  { type: keyword }
  host.os.version:               { type: keyword }
  # HTTP
  http.request.method:           { type: keyword }
  http.request.body.content:     { type: wildcard }
  http.response.status_code:     { type: long }
  http.response.body.content:    { type: wildcard }
  http.version:                  { type: keyword }
  # Log
  log.level:                     { type: keyword }
  log.logger:                    { type: keyword }
  log.origin.file.name:          { type: keyword }
  log.origin.function:           { type: keyword }
  # Network
  network.bytes:                 { type: long }
  network.direction:             { type: keyword }
  network.protocol:              { type: keyword }
  network.transport:             { type: keyword }
  network.type:                  { type: keyword }
  # Observer
  observer.hostname:             { type: keyword }
  observer.ip:                   { type: ip }
  observer.name:                 { type: keyword }
  observer.type:                 { type: keyword }
  # Process
  process.args:                  { type: keyword }
  process.executable:            { type: keyword }
  process.name:                  { type: keyword }
  process.pid:                   { type: long }
  # URL
  url.domain:                    { type: keyword }
  url.full:                      { type: wildcard }
  url.original:                  { type: wildcard }
  url.path:                      { type: wildcard }
  url.port:                      { type: long }
  url.query:                     { type: keyword }
  url.scheme:                    { type: keyword }
  # User
  user.email:                    { type: keyword }
  user.id:                       { type: keyword }
  user.name:                     { type: keyword }
  # User Agent
  user_agent.name:               { type: keyword }
  user_agent.original:           { type: keyword }
  user_agent.version:            { type: keyword }
  # File
  file.name:                     { type: keyword }
  file.path:                     { type: keyword }
  file.size:                     { type: long }
  file.extension:                { type: keyword }
  # Error
  error.code:                    { type: keyword }
  error.message:                 { type: text }
  error.stack_trace:             { type: wildcard }
  # Related
  related.ip:                    { type: ip }
  related.user:                  { type: keyword }
  related.hash:                  { type: keyword }
  related.hosts:                 { type: keyword }

# ══════════════════════════════════════════════════════════════════════════════
# Search Agent – Configuration
# ══════════════════════════════════════════════════════════════════════════════
# Settings for the Elasticsearch log search agent.

search_agent:
  # How many times the agent retries fixing a query that fails validation
  max_query_fix_retries: 3

  # Maximum aggregation nesting depth (company policy: never exceed 3)
  max_agg_depth: 3

  # Maximum number of buckets per terms/histogram aggregation
  max_buckets: 1000

  # How many candidate indices the resolve_index tool should return
  top_k_indices: 5


# ══════════════════════════════════════════════════════════════════════════════
# Illumio Agent – Configuration
# ══════════════════════════════════════════════════════════════════════════════
# Settings for the Illumio cross-environment traffic analysis agent.

illumio_agent:
  # Elasticsearch index pattern for Illumio flow logs
  illumio_index_pattern: "your-index-*"

  # Elasticsearch field paths for Illumio workload labels
  source_env_field:  "illumio.source.labels.env"
  dest_env_field:    "illumio.destination.labels.env"
  source_app_field:  "illumio.source.labels.app"
  dest_app_field:    "illumio.destination.labels.app"

  # Environment label values used in the term filters
  dev_env_value:  "E_DEV"
  prod_env_value: "E_PROD"

  # Destination app prefix template  ({app_code} is replaced by e.g. AP12345)
  app_prefix_format: "A_{app_code}-"

  # Maximum number of source-application buckets returned by the aggregation
  agg_size: 50


# ══════════════════════════════════════════════════════════════════════════════
# Illumio Blocked Flows Agent – Configuration
# ══════════════════════════════════════════════════════════════════════════════
# Settings for the Illumio blocked-flows analysis agent.
# Answers: "Est-ce qu'il y a eu des flux bloqués vers ou depuis mon application/serveur ?"

illumio_blocked_agent:
  # Elasticsearch index pattern for Illumio flow logs
  illumio_index_pattern: "your-index-*"

  # Field that carries the Illumio policy decision and its denied value
  policy_decision_field: "illumio.policy_decision"
  denied_value: "denied"

  # Hostname fields (used when target_type = "hostname")
  source_hostname_field: "illumio.source.hostname"
  dest_hostname_field:   "illumio.destination.hostname"

  # App label fields (used when target_type = "app")
  source_app_field: "illumio.source.labels.app"
  dest_app_field:   "illumio.destination.labels.app"

  # App prefix template ({app_code} is replaced by e.g. AP12345)
  app_prefix_format: "A_{app_code}-"

  # Network fields used in aggregations
  dest_port_field:  "destination.port"
  protocol_field:   "network.protocol"

  # Maximum number of buckets returned per aggregation
  agg_size: 20


# ══════════════════════════════════════════════════════════════════════════════
# Illumio Service Consumers Agent – Configuration
# ══════════════════════════════════════════════════════════════════════════════
# Settings for the Illumio service-consumers analysis agent.
# Answers: "Quelles sont toutes les applications qui consomment mon service ?"

illumio_consumers_agent:
  # Elasticsearch index pattern for Illumio flow logs
  illumio_index_pattern: "your-index-*"

  # App label fields
  source_app_field: "illumio.source.labels.app"
  dest_app_field:   "illumio.destination.labels.app"

  # Environment label fields and values (for env-based filtering)
  source_env_field: "illumio.source.labels.env"
  dest_env_field:   "illumio.destination.labels.env"
  dev_env_value:    "E_DEV"
  prod_env_value:   "E_PROD"

  # Policy decision field and allowed value
  # Note: uses top-level "policy_decision" (not prefixed with "illumio.")
  policy_decision_field: "policy_decision"
  allowed_value: "Allowed"

  # App prefix template ({app_code} is replaced by e.g. AP12345)
  app_prefix_format: "A_{app_code}-"

  # Maximum number of consumer application buckets returned by the aggregation
  agg_size: 20
